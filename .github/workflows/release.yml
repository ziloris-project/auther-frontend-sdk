# Release pipeline driven by Changesets, publishing to npm via OIDC
# Trusted Publishing — no npm token (npm classic tokens were revoked in
# Dec 2025).
#
# Authoring flow (a PR adding a feature):
#   1. Make the code change.
#   2. Run `pnpm changeset` and pick the affected packages + semver impact.
#   3. Commit the generated .changeset/*.md alongside the code.
#   4. Open the PR. Reviewer sees the changelog entry in the diff.
#
# Release flow (this workflow):
#   1. Pushes to main run the workflow.
#   2. If any .changeset/*.md files exist, changesets/action opens a PR
#      titled "chore(release): version packages" that bumps versions in
#      package.json, updates each package's CHANGELOG.md, and deletes the
#      consumed changeset files.
#   3. Merging that PR triggers this workflow again. This time there are
#      no pending changesets, so the Publish step runs `pnpm -r publish`.
#   4. Each publish is signed with sigstore provenance so npmjs.com
#      renders a verified attestation badge linking the artifact to this
#      exact workflow run.
#
# Auth: npm OIDC Trusted Publishing. NO secret token. Each published
# package (@auther-sdk/frontend, @auther-sdk/react) must have a Trusted
# Publisher configured on npmjs.com pointing at:
#   org/user:  ziloris-project
#   repo:      auther-frontend-sdk
#   workflow:  release.yml
# Publishing is done by pnpm (packageManager pnpm@10, which supports OIDC
# and rewrites workspace:^ deps), not `changeset publish` (whose OIDC path
# breaks on pnpm workspaces). Requires the id-token: write permission.
#
# Optional secret:
#   - CHANGESETS_PAT — PAT used to open the Version Packages PR so that
#     push-from-bot triggers CI. Falls back to GITHUB_TOKEN.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents:       write
  pull-requests:  write
  id-token:       write

jobs:
  release:
    name: Version + publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # changesets needs full history to determine which packages
          # changed since the last release.
          fetch-depth: 0

      # pnpm version is read from package.json#packageManager. Don't
      # set `version:` here — pnpm/action-setup errors out if both are
      # specified.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      # pnpm's publish delegates the registry PUT to npm, and OIDC trusted
      # publishing needs npm >= 11.5.1. The runner ships npm 10, which
      # fails OIDC auth and returns a misleading E404. Upgrade it.
      - name: Upgrade npm to OIDC-capable version
        run: npm install -g npm@latest

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      # Changesets handles versioning ONLY. When changesets are pending it
      # opens / updates the Version Packages PR; it does not publish here.
      # `changeset publish` is deliberately not used: on a pnpm workspace
      # its OIDC path forwards a pnpm-only `--git-checks` flag to
      # `npm publish`, which npm rejects. pnpm's own publish (below) does
      # OIDC natively and rewrites workspace:^ deps correctly.
      - name: Version (open Version Packages PR)
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          commit:  'chore(release): version packages'
          title:   'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_PAT || secrets.GITHUB_TOKEN }}

      # Runs only when there are no pending changesets, i.e. versions are
      # final (fresh push, or a Version Packages PR just merged). pnpm
      # publishes every workspace package whose version is not yet on npm,
      # authenticated by OIDC trusted publishing, signed with provenance.
      - name: Publish to npm
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: pnpm -r publish --no-git-checks --access public
        env:
          NPM_CONFIG_PROVENANCE: 'true'
